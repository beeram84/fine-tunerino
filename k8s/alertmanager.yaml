global:
  resolve_timeout: 5m

route:
  receiver: slack-email
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 10m

receivers:
- name: slack-email
  slack_configs:
  - api_url: "<webhookurl genrated in the slackapi portal>"
    channel: "#monitoring-alerts"
    send_resolved: true
    title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
    text: >
      {{ range .Alerts }}
      *Alert:* {{ .Annotations.summary }}
      *Description:* {{ .Annotations.description }}
      *Namespace:* {{ .Labels.namespace }}
      *Pod:* {{ .Labels.pod }}
      *Severity:* {{ .Labels.severity }}
      {{ end }}

  email_configs:
  - to: "<email>"
    from: "<email>"
    smarthost: "smtp.gmail.com:587"
    auth_username: "<email>"
    auth_password: "<password generated from email>"
    require_tls: true
    send_resolved: true
