grafana:
  adminPassword: "Admin@1234"
  service:
    type: LoadBalancer

alertmanager:
  enabled: true
  service:
    type: LoadBalancer

prometheus:
  enabled: true
  service:
    type: LoadBalancer
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        memory: 256Mi
        cpu: 50m
      limits:
        memory: 512Mi
        cpu: 200m

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: true