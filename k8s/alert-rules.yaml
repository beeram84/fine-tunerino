apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alert-rules
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:

    # ─────────────────────────────
    # POD ALERTS
    # ─────────────────────────────
    - name: pod-alerts
      rules:

        # Alert: Pod is crash looping
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 * 5 > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} is restarting"

        # Alert: Pod is not running
        - alert: PodNotRunning
          expr: kube_pod_status_phase{phase!="Running", phase!="Succeeded"} == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not running"
            description: "Pod {{ $labels.pod }} is in {{ $labels.phase }} state"

    # ─────────────────────────────
    # RESOURCE ALERTS
    # ─────────────────────────────
    - name: resource-alerts
      rules:

        # Alert: High CPU
        - alert: HighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace) * 100 > 80
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} CPU is above 80%"

        # Alert: High Memory
        - alert: HighMemoryUsage
          expr: sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace) / sum(container_spec_memory_limit_bytes{container!=""}) by (pod, namespace) * 100 > 80
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High Memory on {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} memory is above 80%"